name: CI

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: testpassword
          POSTGRES_DB: ecommerce_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/ecommerce_test
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: testpassword
      SPRING_DATA_REDIS_HOST: localhost
      SPRING_DATA_REDIS_PORT: 6379
      JWT_SECRET: test-secret-key-for-ci-only-not-real
      STRIPE_SECRET_KEY: sk_test_dummy
      STRIPE_PUBLISHABLE_KEY: pk_test_dummy
      STRIPE_WEBHOOK_SECRET: whsec_dummy
      CLOUDINARY_CLOUD_NAME: dummy
      CLOUDINARY_API_KEY: dummy
      CLOUDINARY_API_SECRET: dummy
      SPRING_MAIL_HOST: localhost
      SPRING_MAIL_PORT: 1025

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Diagnose Java SSL environment
        run: |
          echo "=== JAVA_HOME ==="
          echo $JAVA_HOME
          echo "=== Java version ==="
          java -version
          echo "=== cacerts location ==="
          find $JAVA_HOME -name "cacerts" 2>/dev/null
          echo "=== cacerts file info ==="
          ls -la $JAVA_HOME/lib/security/cacerts 2>/dev/null || echo "NOT FOUND"
          echo "=== System cacerts ==="
          ls -la /etc/ssl/certs/java/cacerts 2>/dev/null || echo "NOT FOUND"
          echo "=== Test SSL with curl ==="
          curl -v https://services.gradle.org 2>&1 | head -20
          echo "=== Test SSL with java ==="
          java -Djavax.net.debug=ssl:handshake \
               -jar $JAVA_HOME/lib/security/cacerts 2>&1 || true

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build
        run: ./gradlew classes -x test